```html
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Gym Coach</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

header{
padding:15px;
font-size:22px;
background:#020617;
}

.section{display:none;padding:20px}
.active{display:block}

button{
padding:12px 18px;
margin:6px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
}

.green{background:#22c55e}
.blue{background:#3b82f6}

.counter{
font-size:70px;
margin:10px;
}

#exerciseCanvas{
width:100%;
height:250px;
}

nav{
position:fixed;
bottom:0;
width:100%;
background:#020617;
display:flex;
justify-content:space-around;
padding:10px;
}

nav button{
background:none;
color:white;
font-size:14px;
}

input{
padding:10px;
margin:6px;
font-size:15px;
}

</style>
</head>

<body>

<header>🤖 AI Gym Coach</header>

<!-- WORKOUT PAGE -->

<div id="workout" class="section active">

<h2 id="coach">Generate workout</h2>

<div id="exerciseCanvas"></div>

<div class="counter" id="repCounter">0</div>

<button class="green" onclick="addRep()">+ Rep</button>
<button class="blue" onclick="startRest()">Rest</button>

<br><br>

<button onclick="generateWorkout()">AI Workout</button>

<div id="plan"></div>

</div>

<!-- BODY TRACKING -->

<div id="body" class="section">

<h3>Body Tracking</h3>

<input id="weightInput" placeholder="Weight">
<input id="fatInput" placeholder="Body Fat %">

<button onclick="saveBody()">Save</button>

<canvas id="bodyChart"></canvas>

</div>

<!-- TRAINER CHAT -->

<div id="trainer" class="section">

<h3>AI Personal Trainer</h3>

<div id="chat" style="height:200px;overflow:auto;text-align:left"></div>

<input id="chatInput" placeholder="Ask trainer...">

<button onclick="chat()">Send</button>

</div>

<!-- STATS -->

<div id="stats" class="section">

<h3>Workout Stats</h3>

<div id="calories"></div>

<canvas id="progressChart"></canvas>

</div>

<!-- NAV -->

<nav>

<button onclick="show('workout')">Workout</button>
<button onclick="show('body')">Body</button>
<button onclick="show('trainer')">Trainer</button>
<button onclick="show('stats')">Stats</button>

</nav>

<script>

/* STORAGE */

let history = JSON.parse(localStorage.getItem("history")) || []
let bodyStats = JSON.parse(localStorage.getItem("bodyStats")) || []

/* EXERCISES */

const exercises=[

{name:"Pushups",muscle:"chest",reps:12,sets:3},
{name:"Squats",muscle:"legs",reps:15,sets:3},
{name:"Plank",muscle:"core",reps:30,sets:3},
{name:"Lunges",muscle:"legs",reps:12,sets:3}

]

/* PERIODIZED PLAN */

function generateWorkout(){

let week=Math.floor(history.length/4)

let plan=[]

exercises.forEach(ex=>{

let r=ex.reps+(week*2)

plan.push({...ex,reps:r})

})

workout=plan.sort(()=>0.5-Math.random()).slice(0,3)

index=0
set=1
reps=0

renderPlan()

startExercise()

}

/* WORKOUT ENGINE */

let workout=[]
let index=0
let set=1
let reps=0
let calories=0

function renderPlan(){

document.getElementById("plan").innerHTML=

workout.map(e=>e.name+" "+e.reps+" reps x "+e.sets).join("<br>")

}

function startExercise(){

let ex=workout[index]

document.getElementById("coach").innerText=

ex.name+" "+ex.reps+" reps (set "+set+")"

speak("Start "+ex.name)

}

function addRep(){

reps++

document.getElementById("repCounter").innerText=reps

let ex=workout[index]

if(reps>=ex.reps){

burnCalories(ex)

nextSet()

}

}

function nextSet(){

let ex=workout[index]

if(set<ex.sets){

set++
reps=0
startRest()

}else{

nextExercise()

}

}

function startRest(){

let t=20

document.getElementById("coach").innerText="Rest"

let timer=setInterval(()=>{

t--

document.getElementById("repCounter").innerText=t

if(t<=0){

clearInterval(timer)

startExercise()

}

},1000)

}

function nextExercise(){

index++
set=1
reps=0

if(index>=workout.length){

finishWorkout()
return

}

startExercise()

}

function finishWorkout(){

document.getElementById("coach").innerText="Workout complete"

history.push({date:new Date().toDateString()})

localStorage.setItem("history",JSON.stringify(history))

updateChart()

}

/* CALORIES */

function burnCalories(ex){

calories += ex.reps*0.5

document.getElementById("calories").innerText=

"Calories burned: "+Math.round(calories)

}

/* VOICE */

function speak(text){

let msg=new SpeechSynthesisUtterance(text)

speechSynthesis.speak(msg)

}

/* BODY TRACKING */

function saveBody(){

let w=document.getElementById("weightInput").value
let f=document.getElementById("fatInput").value

bodyStats.push({w,f})

localStorage.setItem("bodyStats",JSON.stringify(bodyStats))

drawBodyChart()

}

function drawBodyChart(){

let ctx=document.getElementById("bodyChart")

let weights=bodyStats.map(b=>b.w)

if(window.bodyChart)bodyChart.destroy()

window.bodyChart=new Chart(ctx,{

type:'line',
data:{labels:weights,datasets:[{data:weights}]}

})

}

/* PROGRESS */

function updateChart(){

let ctx=document.getElementById("progressChart")

let data=history.map((h,i)=>i+1)

if(window.chart)chart.destroy()

window.chart=new Chart(ctx,{

type:'line',
data:{labels:data,datasets:[{data:data}]}

})

}

/* CHAT */

function chat(){

let input=document.getElementById("chatInput").value

let div=document.createElement("div")
div.innerText="You: "+input
chat.appendChild(div)

let reply=document.createElement("div")

if(input.includes("workout"))
reply.innerText="Trainer: Focus on compound exercises."

else if(input.includes("fat"))
reply.innerText="Trainer: Combine cardio and strength."

else
reply.innerText="Trainer: Stay consistent."

chat.appendChild(reply)

}

/* NAVIGATION */

function show(id){

document.querySelectorAll(".section")

.forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

/* 3D ANIMATION */

let scene=new THREE.Scene()
let camera=new THREE.PerspectiveCamera(75,1,0.1,1000)
let renderer=new THREE.WebGLRenderer()

renderer.setSize(300,200)

document.getElementById("exerciseCanvas").appendChild(renderer.domElement)

let geometry=new THREE.BoxGeometry()
let material=new THREE.MeshBasicMaterial({color:0x22c55e})
let cube=new THREE.Mesh(geometry,material)

scene.add(cube)
camera.position.z=3

function animate(){

requestAnimationFrame(animate)

cube.rotation.x+=0.01
cube.rotation.y+=0.01

renderer.render(scene,camera)

}

animate()

/* SERVICE WORKER */

if('serviceWorker' in navigator){

navigator.serviceWorker.register('sw.js')

}

/* INIT */

updateChart()
drawBodyChart()

</script>

</body>
</html>
