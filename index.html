<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Gym Coach</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  margin:0;
}

header{
  background:#020617;
  padding:20px;
  font-size:26px;
}

.counter{
  font-size:100px;
  margin:20px;
}

button{
  padding:15px 25px;
  margin:6px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.green{background:#22c55e;color:white;}
.blue{background:#3b82f6;color:white;}
.orange{background:#f97316;color:white;}
.red{background:#ef4444;color:white;}

input{
  padding:10px;
  margin:6px;
  font-size:16px;
}

.section{
  margin-top:30px;
}

canvas{
  background:white;
  margin-top:20px;
}
</style>
</head>

<body>
<header>🤖 AI Gym Coach</header>

<h2 id="activityName">Select Activity</h2>
<div class="counter" id="display">0</div>

<button class="green" onclick="addRep()">+ Rep</button>
<button class="blue" onclick="startTimer()">Start Timer</button>
<button class="red" onclick="reset()">Reset</button>

<div class="section">
<h3>Add Exercise / Cardio / Stretch</h3>
<input id="activityInput" placeholder="Activity name">
<button onclick="addActivity()">Save Activity</button>
</div>

<div class="section">
<h3>Your Activities</h3>
<div id="activityList"></div>
</div>

<div class="section">
<h3>Daily Workout</h3>
<button onclick="generateWorkout()">Generate Workout</button>
<div id="workoutPlan"></div>
</div>

<div class="section">
<h3>Progress Tracker</h3>
<canvas id="progressChart" width="350" height="200"></canvas>
</div>

<script>
// ===== Variables =====
let reps = 0;
let seconds = 0;
let timer;
let currentActivity = null;

let activities = JSON.parse(localStorage.getItem("activities")) || [];
let workoutHistory = JSON.parse(localStorage.getItem("workoutHistory")) || [];

// ===== Activity Management =====
function addActivity(){
  let name = document.getElementById("activityInput").value;
  if(!name) return;
  if(!activities.includes(name)) activities.push(name);
  localStorage.setItem("activities", JSON.stringify(activities));
  renderActivities();
  document.getElementById("activityInput").value = "";
}

function renderActivities(){
  let container = document.getElementById("activityList");
  container.innerHTML = "";
  activities.forEach(a => {
    let btn = document.createElement("button");
    btn.innerText = a;
    btn.onclick = () => selectActivity(a);
    container.appendChild(btn);
  });
}

function selectActivity(name){
  currentActivity = name;
  document.getElementById("activityName").innerText = name;
  reset();
}

// ===== Reps & Timer =====
function addRep(){
  reps++;
  document.getElementById("display").innerText = reps;
}

function startTimer(){
  seconds = 0;
  clearInterval(timer);
  timer = setInterval(()=>{
    seconds++;
    document.getElementById("display").innerText = seconds;
  }, 1000);
}

function reset(){
  reps = 0;
  seconds = 0;
  clearInterval(timer);
  document.getElementById("display").innerText = 0;
}

// ===== Workout Memory =====
function saveWorkout(){
  if(!currentActivity) return;
  let entry = {
    activity: currentActivity,
    reps: reps,
    duration: seconds,
    date: new Date().toLocaleDateString()
  };
  workoutHistory.push(entry);
  localStorage.setItem("workoutHistory", JSON.stringify(workoutHistory));
  updateProgressChart();
}

// ===== Daily Workout Generator & AI Rotation =====
function generateWorkout(){
  if(activities.length === 0){
    document.getElementById("workoutPlan").innerHTML = "No activities saved yet!";
    return;
  }

  let today = new Date().toLocaleDateString();
  // Check if today's workout already exists
  let existing = workoutHistory.find(w => w.date === today);
  if(existing && existing.dailyPlan){
    document.getElementById("workoutPlan").innerHTML = existing.dailyPlan.join("<br>");
    return;
  }

  // Simple AI: pick 5 random exercises, avoid repeats from last 3 days
  let recentActivities = workoutHistory.slice(-15).map(w => w.activity);
  let available = activities.filter(a => !recentActivities.includes(a));
  if(available.length < 5) available = activities; // fallback if not enough

  let dailyPlan = [];
  for(let i=0; i<5; i++){
    let r = Math.floor(Math.random() * available.length);
    dailyPlan.push(available[r]);
  }

  document.getElementById("workoutPlan").innerHTML = dailyPlan.join("<br>");

  // Save the daily plan in workout history
  workoutHistory.push({date: today, dailyPlan});
  localStorage.setItem("workoutHistory", JSON.stringify(workoutHistory));
  updateProgressChart();
}

// ===== Progress Tracker =====
function updateProgressChart(){
  let ctx = document.getElementById('progressChart').getContext('2d');

  let dates = workoutHistory.map(w => w.date);
  let repsData = workoutHistory.map(w => w.reps || 0);
  let durationData = workoutHistory.map(w => w.duration || 0);

  if(window.myChart) window.myChart.destroy();

  window.myChart = new Chart(ctx, {
    type:'line',
    data:{
      labels: dates,
      datasets:[
        {label:"Reps", data: repsData, borderColor:"green", fill:false},
        {label:"Duration (s)", data: durationData, borderColor:"blue", fill:false}
      ]
    }
  });
}

// ===== Initialize =====
renderActivities();
updateProgressChart();

// ===== Voice Recognition =====
if('webkitSpeechRecognition' in window){
  let recognition = new webkitSpeechRecognition();
  recognition.continuous = true;
  recognition.onresult = function(event){
    let speech = event.results[event.results.length-1][0].transcript.trim().toLowerCase();
    if(speech.includes("rep")) addRep();
    if(speech.includes("start")) startTimer();
    if(speech.includes("reset")) reset();
    if(speech.includes("save")) saveWorkout();
  }
  recognition.start();
}

</script>
</body>
</html>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="AI Gym Coach">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">

</body>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js')
    .then(() => console.log('Service Worker Registered'))
    .catch(err => console.log('Service Worker Registration Failed:', err));
}
</script>
